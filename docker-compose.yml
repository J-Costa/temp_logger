services:
  timescaledb:
    image: timescale/timescaledb-ha:pg18
    pull_policy: never
    restart: unless-stopped
    ports:
      - "${DATABASE_PORT:-6543}:5432"
    environment:
      POSTGRES_USER: ${DATABASE_USER:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-password}
      POSTGRES_DB: ${DATABASE_NAME:-temp_logger_development}
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./docker/timescaledb/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-postgres} -d ${DATABASE_NAME:-temp_logger_development}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  timescale_data:
